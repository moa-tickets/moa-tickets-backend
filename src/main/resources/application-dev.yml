spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: never
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    # 브로커 주소 목록 (클러스터 구성)
    bootstrap-servers:
      - localhost:9092
      - localhost:9093
      - localhost:9094

    producer:
      # key/value 직렬화 클래스
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 메시지를 즉시 보내지 않고, 최대 1ms 동안 배치 모으기
      linger-ms: 1

logging:
  level:
    org.hibernate.SQL: debug

app:
  frontend:
    url: http://localhost:5173
  cookie:
    domain: localhost